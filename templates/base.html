{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Confeitaria Artesanal — doces que contam histórias, feitos com técnica clássica e ingredientes selecionados.">
    <meta name="theme-color" content="#111111">
    <title>{% block title %}Confeitaria Artesanal{% endblock %}</title>

    <!-- Google Fonts: Cormorant Garamond (display) + DM Sans (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary':      '#6B3A2A',
                        'primary-dark': '#4A2318',
                        'accent':       '#C9A227',
                        'bg':           '#0E0C0B',
                        'surface':      '#191512',
                        'surface-2':    '#241E19',
                        'border-c':     '#332820',
                        'text-hi':      '#F2E2C4',
                        'text-lo':      '#8A7A6A',
                        'success':      '#4A7C59',
                        'error':        '#CC2936',
                    },
                    fontFamily: {
                        'display': ['"Cormorant Garamond"', 'Georgia', 'serif'],
                        'sans':    ['"DM Sans"', 'system-ui', 'sans-serif'],
                    },
                    letterSpacing: {
                        'luxury': '0.18em',
                    },
                    transitionTimingFunction: {
                        'out-expo': 'cubic-bezier(0.16, 1, 0.3, 1)',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #0E0C0B;
        }
        ::selection {
            background-color: #C9A22740;
            color: #F2E2C4;
        }
        :focus-visible {
            outline: 2px solid #C9A227;
            outline-offset: 2px;
        }
        .text-balance { text-wrap: balance; }
    </style>
</head>
<body class="text-[#F2E2C4] font-sans flex flex-col min-h-screen relative">

    <!-- Navbar -->
    <header role="banner" class="relative z-50">
        <nav aria-label="Navegação principal" class="sticky top-0 z-50 bg-[#0E0C0B]/95 backdrop-blur-xl border-b border-[#332820]">
            <div class="max-w-7xl mx-auto px-5 sm:px-8 lg:px-10 flex items-center justify-between h-16">
                <!-- Logo -->
                <a href="{% url 'catalog:home' %}" class="font-display text-xl font-semibold text-[#C9A227] tracking-[0.08em] focus-visible:outline-[#C9A227]">
                    Confeitaria Artesanal
                </a>
                <!-- Links -->
                <div class="flex items-center gap-8">
                    <a href="{% url 'catalog:home' %}" class="font-sans text-sm font-medium text-[#8A7A6A] hover:text-[#F2E2C4] transition-colors duration-200">
                        Início
                    </a>
                    <a href="{% url 'catalog:product_list' %}" class="font-sans text-sm font-medium text-[#8A7A6A] hover:text-[#F2E2C4] transition-colors duration-200">
                        Catálogo
                    </a>
                </div>
            </div>
        </nav>
    </header>

    <main class="flex-grow relative z-10" id="main-content">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Rodapé -->
    <footer role="contentinfo" class="relative z-10 bg-[#191512]/90 backdrop-blur-sm border-t border-[#332820] py-10 mt-20">
        <div class="max-w-7xl mx-auto px-5 text-center">
            <p class="font-display text-[#C9A227] text-xl font-semibold tracking-wide">Confeitaria Artesanal</p>
            <p class="mt-2 text-sm text-[#8A7A6A] font-light">Feito com carinho.</p>
        </div>
    </footer>
</body>
</html>
