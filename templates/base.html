<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Confeitaria Artesanal{% endblock %}</title>
    
    <!-- Google Fonts: Playfair Display + Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary': '#6B3A2A',
                        'primary-dark': '#4A2318',
                        'accent': '#C9A227',
                        'background': '#111111',
                        'surface': '#1E1A18',
                        'surface-light': '#2C2420',
                        'text-primary': '#F5E6C8',
                        'text-secondary': '#A89880',
                        'border': '#3D2E24',
                        'success': '#4A7C59',
                        'error': '#CC2936',
                    },
                    fontFamily: {
                        'playfair': ['"Playfair Display"', 'serif'],
                        'inter': ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        @layer base {
            body {
                @apply bg-[#111111] text-[#F5E6C8] font-['Inter'];
            }
        }
    </style>
</head>
<body class="bg-[#111111] text-[#F5E6C8] font-['Inter'] flex flex-col min-h-screen">
    <!-- Navbar (PRD 9.8) -->
    <nav class="sticky top-0 z-50 bg-[#111111]/90 backdrop-blur-md border-b border-[#3D2E24]">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between h-16">
            <!-- Logo / Nome da confeitaria -->
            <a href="{% url 'catalog:home' %}" class="font-['Playfair_Display'] text-xl font-bold text-[#C9A227] tracking-wide">
                Confeitaria Artesanal
            </a>
            <!-- Links -->
            <div class="flex gap-6">
                <a href="{% url 'catalog:home' %}" class="text-[#A89880] hover:text-[#F5E6C8] transition-colors text-sm font-medium">Início</a>
                <a href="{% url 'catalog:product_list' %}" class="text-[#A89880] hover:text-[#F5E6C8] transition-colors text-sm font-medium">Catálogo</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Rodapé (PRD 9.9) -->
    <footer class="bg-[#1E1A18] border-t border-[#3D2E24] py-8 mt-16">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="font-['Playfair_Display'] text-[#C9A227] text-lg font-semibold">Confeitaria Artesanal</p>
            <p class="mt-2 text-sm text-[#A89880]">Feito com carinho.</p>
        </div>
    </footer>
</body>
</html>
